<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>演算法示範首頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 40px;
        }
        .card-container {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            padding: 32px 40px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 200px;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.18);
        }
        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>演算法示範首頁</h1>
    <p>選擇下方的演算法查看視覺化示範</p>
    <div class="card-container">
        <a class="card" href="bubble_sort.html">
            <div class="card-icon">🫧</div>
            <div class="card-title">氣泡排序法</div>
            <div class="card-desc">Bubble Sort 視覺化示範</div>
        </a>
        <a class="card" href="selection_sort.html">
            <div class="card-icon">🎯</div>
            <div class="card-title">選擇排序法</div>
            <div class="card-desc">Selection Sort 視覺化示範</div>
        </a>
        <a class="card" href="insertion_sort.html">
            <div class="card-icon">📥</div>
            <div class="card-title">插入排序法</div>
            <div class="card-desc">Insertion Sort 視覺化示範</div>
        </a>
    </div>
</body>
</html>
